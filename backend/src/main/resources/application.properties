spring.application.name=workflow-backend

# --- DATABASE CONFIGURATION ---
# Default to H2 (Local), override with Env Vars for Neon.tech (Production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/workflow_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# Hibernate & JPA
# Hibernate will auto-detect the dialect based on the JDBC URL
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- H2 CONSOLE (Only works when H2 is active) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- FLYWAY MIGRATIONS ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# This ensures Flyway works even if the DB is empty
spring.flyway.baseline-on-migrate=true

# --- SERVER ---
server.port=${PORT:8080}

# --- SECURITY ---
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# --- LOGGING ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.flywaydb=INFO
